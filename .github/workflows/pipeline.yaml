name: ML pipeline

on:
  push:
    branches: [main]

jobs:

  quality_check:

    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: install requirements
        run: |
          pip install -r requirements.txt
          pip install flake8
      - name: linter
        run: flake8 .

  train:

    if: success() && contains(github.event.head_commit.message, "[run-train]")
    needs: quality_check
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install requirements
        run: pip install -r requirements.txt

      - name: trian model
        run: python train.py

      - name: upload logs if fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
      
      - name: cleanup
        if: always()
        run: |
          rm -rf temp/
          rm -rf cache/

  evaluate:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: install requirements
        run: pip install -r requirements.txt

      - name: evaluate
        run: python eval.py

      - name: cleanup
        if: always()
        run: |
          rm -rf temp/
          rm -rf cache/


